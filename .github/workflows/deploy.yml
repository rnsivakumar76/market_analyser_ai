# ──────────────────────────────────────────────────────────────────────────────
# Deploy Workflow — Runs on push to main
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_BACKEND: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/market-analyser-backend
  TF_ROOT: infrastructure/terraform

jobs:
  # 1. Build & Push Backend
  build-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          docker build -t $ECR_BACKEND:latest ./backend
          docker push $ECR_BACKEND:latest

  # 2. Build Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Using Node 22 for Angular 20
      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build -- --configuration production
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser/
          retention-days: 1

  # 3. Terraform Apply
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Apply
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=market-analyser/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"
          terraform apply -auto-approve \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="backend_image=${{ env.ECR_BACKEND }}:latest"
      - name: Save outputs
        run: |
          cd ${{ env.TF_ROOT }}
          terraform output -json > tf_outputs.json
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: ${{ env.TF_ROOT }}/tf_outputs.json

  # 4. Deploy Backend (Update Lambda)
  deploy-backend:
    name: Update Lambda
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name market-analyser-api \
            --image-uri ${{ env.ECR_BACKEND }}:latest

  # 5. Deploy Frontend (Sync S3)
  deploy-frontend:
    name: Sync S3
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Download outputs
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs
          path: .
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist
      - name: Sync S3 & Invalidate CloudFront
        run: |
          BUCKET=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['frontend_s3_bucket']['value'])")
          DIST_ID=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['cloudfront_distribution_id']['value'])")
          
          # Sync to S3
          aws s3 sync ./dist/ s3://$BUCKET/ --delete
          
          # Invalidate CloudFront Cache
          echo "Invalidating CloudFront cache for $DIST_ID..."
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
      - name: Summary
        run: |
          CF_URL=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['cloudfront_url']['value'])")
          S3_URL=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['frontend_url']['value'])")
          echo "### 🚀 App is live!" >> $GITHUB_STEP_SUMMARY
          echo "- **Secure (HTTPS):** $CF_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Direct S3 (HTTP):** $S3_URL" >> $GITHUB_STEP_SUMMARY
