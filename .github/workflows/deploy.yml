# ──────────────────────────────────────────────────────────────────────────────
# Deploy Workflow — Dual Environment (Dev + Prod)
#
# develop branch → deploys to DEV environment
# main branch    → deploys to PROD environment (requires approval)
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy to AWS

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_BACKEND: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/market-analyser-backend
  TF_ROOT: infrastructure/terraform

jobs:
  # ─── Determine Environment ──────────────────────────────────────────────────
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
      tf_workspace: ${{ steps.env.outputs.tf_workspace }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="dev"
          fi
          
          if [ "$ENV" = "production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "tf_workspace=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "image_tag=dev" >> $GITHUB_OUTPUT
            echo "tf_workspace=dev" >> $GITHUB_OUTPUT
          fi

  # ─── Build & Push Backend ───────────────────────────────────────────────────
  build-push-backend:
    name: Build & Push Backend (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          TAG=${{ needs.setup.outputs.image_tag }}
          docker build -t $ECR_BACKEND:$TAG ./backend
          docker push $ECR_BACKEND:$TAG

  # ─── Build Frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install & Build
        run: |
          cd frontend
          npm ci
          if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
            npm run build -- --configuration production
          else
            npm run build -- --configuration development
          fi
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser/
          retention-days: 1

  # ─── Terraform Apply ────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, build-push-backend, build-frontend]
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Apply
        run: |
          cd ${{ env.TF_ROOT }}
          ENV=${{ needs.setup.outputs.environment }}
          TAG=${{ needs.setup.outputs.image_tag }}
          WORKSPACE=${{ needs.setup.outputs.tf_workspace }}
          
          # Use environment-specific state key
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=market-analyser/${WORKSPACE}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"
          
          # Select or create workspace
          terraform workspace select $WORKSPACE || terraform workspace new $WORKSPACE
          
          # Enable dev imports if in dev workspace to adopt orphaned resources
          if [ "$WORKSPACE" = "dev" ]; then
            mv imports_dev.tf.disabled imports_dev.tf || echo "No imports to enable"
          fi
          
          # Enable prod imports if in prod workspace to adopt shared global resources
          if [ "$WORKSPACE" = "prod" ]; then
            mv imports_prod.tf.disabled imports_prod.tf || echo "No prod imports to enable"
          fi
          
          terraform apply -auto-approve \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="environment=$ENV" \
            -var="backend_image=${{ env.ECR_BACKEND }}:$TAG" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" \
            -var="session_secret=${{ secrets.SESSION_SECRET || secrets.JWT_SECRET_KEY }}" \
            -var="twelvedata_api_key=${{ secrets.TWELVEDATA_API_KEY }}" \
            -var="fmp_api_key=${{ secrets.FMP_API_KEY }}"
      - name: Save outputs
        run: |
          cd ${{ env.TF_ROOT }}
          terraform output -json > tf_outputs.json
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: ${{ env.TF_ROOT }}/tf_outputs.json

  # ─── Deploy Backend (Update Lambda) ─────────────────────────────────────────
  deploy-backend:
    name: Update Lambda (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, terraform-apply]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Download outputs
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs
          path: .
      - name: Update Lambda
        run: |
          TAG=${{ needs.setup.outputs.image_tag }}
          FUNCTION_NAME=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['lambda_function_name']['value'])")
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --image-uri ${{ env.ECR_BACKEND }}:$TAG

  # ─── Deploy Frontend (Sync S3) ─────────────────────────────────────────────
  deploy-frontend:
    name: Sync S3 (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, terraform-apply]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-market-analyser
          aws-region: ${{ vars.AWS_REGION }}
      - name: Download outputs
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs
          path: .
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist
      - name: Sync S3
        run: |
          BUCKET=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['frontend_s3_bucket']['value'])")
          aws s3 sync ./dist/ s3://$BUCKET/ --delete
      - name: Skip CloudFront (Testing S3 Only)
        run: |
          echo "⚠️  Skipping CloudFront invalidation - testing S3 only"
          S3_URL=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin)['frontend_url']['value'])")
          echo "🌐 Test your app at: $S3_URL"
      - name: Summary
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          CF_URL=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('cloudfront_url', {}).get('value'))")
          S3_URL=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('frontend_url', {}).get('value'))")
          API_URL=$(cat tf_outputs.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('api_gateway_url', {}).get('value'))")
          echo "### 🚀 Deployed to **${ENV}**!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🧪 **TESTING MODE** - CloudFront issues being fixed" >> $GITHUB_STEP_SUMMARY
          echo "- **🌐 Test App (S3 Direct):** $S3_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **🔄 CloudFront URL:** $CF_URL (may not work yet)" >> $GITHUB_STEP_SUMMARY
          echo "- **🔗 API Gateway URL:** $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️  Use S3 URL for testing while CloudFront CachedMethods issue is resolved" >> $GITHUB_STEP_SUMMARY

  # ─── End-to-End Testing (Playwright) ────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, deploy-frontend, deploy-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Download outputs
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs
          path: .
      - name: Run Playwright tests
        run: |
          # Use S3 URL for testing while CloudFront issues are being resolved
          APP_URL=$(cat tf_outputs.json | python3 -c "import sys,json; o=json.load(sys.stdin); print(o['frontend_url']['value'])")
          echo "Testing against S3 URL: $APP_URL"
          BASE_URL=$APP_URL npm run test:e2e
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
